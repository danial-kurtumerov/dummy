name: "onboard-repository"

on:
  issues:
    types: [opened, reopened, edited]

jobs:
  onboard-repository:
    name: "onboard-repository"
    runs-on: ['ubuntu-24.04']

    env:
      ONBOARD_REPO_EVENT: ${{ github.event_name }}
      ONBOARD_REPO_TITLE: ${{ github.event.issue.title }}
      ONBOARD_REPO_NUMBER: ${{ github.event.issue.number }}
      ONBOARD_REPO_MESSAGE: ${{ github.event.issue.body }}
      ISSUE_REPO_URL: ${{ github.event.issue.repository_url }}
      REPO_NAME: ${{ github.event.repository.full_name }}
      REPO_URL: ${{ github.event.repository.url }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    if: contains(github.event.issue.labels.*.name, 'onboard-repository')

    steps:

      - name: Get token
        id: github-app
        uses: peter-murray/workflow-application-token-action@v1
        with:
          application_id: ${{ secrets.APPLICATION_ID }}
          application_private_key: ${{ secrets.APPLICATION_PRIVATE_KEY }}
          organization: ${{ secrets.APPLICATION_ORGANIZATION }}

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.2"

      - name: Onboard repository
        run:
          uv run -m src.presentation.controllers --no-dev
        env:
          GITHUB_TOKEN: ${{ steps.github-app.outputs.token }}
          SNOW_USERNAME: ${{ secrets.SNOW_USERNAME }}
          SNOW_PASSWORD: ${{ secrets.SNOW_PASSWORD }}